name: CI — Pull Request

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'
  FIREBASE_PROJECT: mombongo-dev

jobs:
  lint-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test:unit -- --reporter=verbose --coverage
        env:
          VITE_DEV_MODE: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  integration-tests:
    name: Integration Tests (Firebase Emulator)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Cache Firebase Emulator
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v1
      - run: bun install --frozen-lockfile
      - name: Start Firebase Emulator
        run: |
          bunx --package firebase-tools firebase emulators:start \
            --only auth,firestore,storage \
            --project ${{ env.FIREBASE_PROJECT }} \
            --import ./emulator-seed \
            &
          bunx --package wait-on wait-on tcp:127.0.0.1:4000 --timeout 120000
      - name: Run integration tests
        run: bun run test:integration
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8090
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          FIREBASE_STORAGE_EMULATOR_HOST: localhost:9199
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: emulator-failure-dump
          path: emulator-failure-dump/
          retention-days: 3

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.STAGING_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.STAGING_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: mombongo-dev
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.STAGING_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.STAGING_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.STAGING_FIREBASE_APP_ID }}
          VITE_ENVIRONMENT: staging

  pr-comment:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, build-check]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.pull_request?.head?.repo?.full_name !== context.repo.owner + '/' + context.repo.repo) {
              core.notice('Skipping PR comment for forked pull request because the integration token cannot write comments.');
              return;
            }

            const u = '${{ needs.unit-tests.result }}'
            const i = '${{ needs.integration-tests.result }}'
            const b = '${{ needs.build-check.result }}'
            const ok = s => s === 'success' ? '✅' : '❌'
            const all = [u,i,b].every(s => s === 'success')
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${all ? '✅' : '❌'} CI Result\n\n| Check | Status |\n|-------|--------|\n| Unit Tests | ${ok(u)} |\n| Integration Tests | ${ok(i)} |\n| Build | ${ok(b)} |\n\n${all ? '**Ready for review.**' : '**Fix failures before requesting review.**'}`
            })
