name: Deploy — Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  FIREBASE_PROJECT: mombongo-dev

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Full CI (lint + typecheck + unit + integration)
  # ─────────────────────────────────────────
  ci:
    name: Full CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Firebase Emulator
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v1

      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test:unit

      - run: bun install -g firebase-tools

      - name: Start Firebase Emulator
        run: |
          firebase emulators:start \
            --only auth,firestore,storage \
            --project ${{ env.FIREBASE_PROJECT }} \
            --import ./emulator-seed \
            &
          npx wait-on http://localhost:4000 --timeout 60000

      - name: Integration tests
        run: bun run test:integration
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          FIREBASE_STORAGE_EMULATOR_HOST: localhost:9199

  # ─────────────────────────────────────────
  # JOB 2: Build (staging config)
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build with staging env
        run: bun run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.STAGING_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.STAGING_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: mombongo-dev
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.STAGING_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.STAGING_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.STAGING_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.STAGING_FIREBASE_VAPID_KEY }}
          VITE_ENVIRONMENT: staging
          VITE_CINETPAY_MODE: sandbox

      - uses: actions/upload-artifact@v4
        with:
          name: dist-staging
          path: dist/

  # ─────────────────────────────────────────
  # JOB 3: Deploy → Cloudflare Pages (staging)
  # ─────────────────────────────────────────
  deploy-cloudflare:
    name: Deploy → Cloudflare Pages (staging)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-staging
          path: dist/

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: mombongo-admin # must match your CF Pages project name
          directory: dist
          # Deploys to the "staging" branch alias → staging.mombongo.coop
          branch: staging
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 4: Deploy Firebase Rules + Indexes
  # ─────────────────────────────────────────
  deploy-firebase:
    name: Deploy Firebase Rules
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install -g firebase-tools

      - name: Deploy Firestore rules + indexes + storage rules
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes,storage:rules \
            --project ${{ env.FIREBASE_PROJECT }} \
            --token ${{ secrets.FIREBASE_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 5: Playwright E2E on staging URL
  # ─────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare, deploy-firebase]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          # Cloudflare Pages gives a stable staging alias URL
          PLAYWRIGHT_BASE_URL: https://staging.mombongo.coop
          TEST_INVESTOR_EMAIL: ${{ secrets.TEST_INVESTOR_EMAIL }}
          TEST_INVESTOR_PASSWORD: ${{ secrets.TEST_INVESTOR_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 6: Notify team (WhatsApp)
  # ─────────────────────────────────────────
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    steps:
      - name: Notify success
        if: needs.e2e.result == 'success'
        run: |
          curl -X POST "${{ secrets.WHATSAPP_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "message": "✅ *Mombongo Staging Deploy* — OK\nURL: https://staging.mombongo.coop\nAll E2E tests passed.\nJuve — please QA on real Android device.",
              "group": "team"
            }'

      - name: Notify failure
        if: needs.e2e.result != 'success'
        run: |
          curl -X POST "${{ secrets.WHATSAPP_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "message": "❌ *Mombongo Staging Deploy* — FAILED\nCheck GitHub Actions for details.",
              "group": "team"
            }'
