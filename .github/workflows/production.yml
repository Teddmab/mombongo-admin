name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false # NEVER cancel a production deploy mid-flight

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "21"
  FIREBASE_PROJECT: mombongo-prod
  PRODUCTION_URL: https://mombongo-admin.pages.dev

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Manual approval gate
  # GitHub → Settings → Environments → production
  # Add Patrick + Afrotouch OU as required reviewers
  # Both must approve before deploy continues
  # ─────────────────────────────────────────
  approval-gate:
    name: Manual Approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production deploy approved by required reviewers."

  # ─────────────────────────────────────────
  # JOB 2: Full CI (mandatory before prod)
  # ─────────────────────────────────────────
  ci:
    name: Full CI
    runs-on: ubuntu-latest
    needs: approval-gate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Firebase Emulator
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v1

      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test:unit

      - name: Start Firebase Emulator
        run: |
          bunx --package firebase-tools firebase emulators:start \
            --only auth,firestore,storage \
            --project mombongo-dev \
            --import ./emulator-seed \
            &
          bunx --package wait-on wait-on http://localhost:4000 --timeout 60000

      - name: Integration tests
        run: bun run test:integration
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          FIREBASE_STORAGE_EMULATOR_HOST: localhost:9199

  # ─────────────────────────────────────────
  # JOB 3: Build (production config)
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build with production env
        run: bun run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: mombongo-prod
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.PROD_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.PROD_FIREBASE_VAPID_KEY }}
          VITE_ENVIRONMENT: production
          VITE_CINETPAY_MODE: live

      - uses: actions/upload-artifact@v4
        with:
          name: dist-production
          path: dist/

  # ─────────────────────────────────────────
  # JOB 4: Deploy Firebase (mombongo-prod)
  # ─────────────────────────────────────────
  deploy-firebase:
    name: Deploy Firebase (prod)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Deploy Firestore rules + indexes + storage rules
        run: |
          bunx --package firebase-tools firebase deploy \
            --only firestore:rules,firestore:indexes,storage:rules \
            --project ${{ env.FIREBASE_PROJECT }} \
            --token ${{ secrets.FIREBASE_TOKEN_PROD }}

  # ─────────────────────────────────────────
  # JOB 5: Deploy → Cloudflare Pages (production)
  # ─────────────────────────────────────────
  deploy-cloudflare:
    name: Deploy → Cloudflare Pages (production)
    runs-on: ubuntu-latest
    needs: [build, deploy-firebase]
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-production
          path: dist/

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: mombongo-admin # must match your CF Pages project name
          directory: dist
          # Deploying main branch = production alias → mombongo-admin.pages.dev
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 6: Smoke tests on production URL
  # (read-only — no writes, no real payments)
  # ─────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-cloudflare
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx playwright install --with-deps chromium

      - name: Run smoke tests
        run: bun run test:smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PRODUCTION_URL }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-test-failure
          path: playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────
  # JOB 7: Health check
  # ─────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
      - name: Check production URL responds with 200
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" ${{ env.PRODUCTION_URL }})
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Production healthy: HTTP $STATUS"

  # ─────────────────────────────────────────
  # JOB 8: Create GitHub Release
  # ─────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: ver
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.ver.outputs.VERSION }}-${{ github.run_number }}
          release_name: v${{ steps.ver.outputs.VERSION }}
          body: |
            **Deployed:** ${{ env.PRODUCTION_URL }}
            **Cloudflare Pages:** mombongo-admin (main branch)
            **Firebase project:** mombongo-prod
            **Commit:** ${{ github.sha }}
          draft: false
          prerelease: false

  # ─────────────────────────────────────────
  # JOB 9: Notify stakeholders
  # ─────────────────────────────────────────
  notify:
    name: Notify Stakeholders
    runs-on: ubuntu-latest
    needs: health-check
    if: always()
    steps:
      - name: Notify success
        if: needs.health-check.result == 'success'
        run: |
          curl -X POST "${{ secrets.WHATSAPP_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "message": "🚀 *Mombongo Production Deploy* — SUCCESS\nURL: ${{ env.PRODUCTION_URL }}\nAll smoke tests passed.\ncc: djuna sambil — la nouvelle version est en ligne!",
              "group": "team"
            }'

      - name: Notify failure
        if: needs.health-check.result != 'success'
        run: |
          curl -X POST "${{ secrets.WHATSAPP_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "message": "🔴 *Mombongo Production Deploy* — FAILED\nSite may be down. Afrotouch OU — immediate attention needed.\nActions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "group": "team"
            }'
